name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          GRADLEW=$(find $GITHUB_WORKSPACE -name "gradlew" -type f | head -1)
          echo "Found: $GRADLEW"
          chmod +x "$GRADLEW"
          cd "$(dirname $GRADLEW)"
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BePikuach-debug-apk
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
